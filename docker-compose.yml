services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dimora-api
    ports:
      - "8000:8000"
    # Load host .env into the container so SMTP_* and other vars match local config
    # (explicit `environment` entries below still override when both are set).
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://dimora:dimora_secret@db:5432/dimora_crm
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - S3_ENDPOINT_URL=http://minio:9000
      - SMTP_ENABLED=${SMTP_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Dimora CRM}
      - EMAIL_NOTIFY_LEADS_ON_MEETING=${EMAIL_NOTIFY_LEADS_ON_MEETING:-false}
      - APP_NAME=${APP_NAME:-Dimora CRM}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./alembic:/app/alembic
    networks:
      - dimora-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dimora-celery-worker
    command: celery -A app.tasks worker --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://dimora:dimora_secret@db:5432/dimora_crm
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SMTP_ENABLED=${SMTP_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Dimora CRM}
      - EMAIL_NOTIFY_LEADS_ON_MEETING=${EMAIL_NOTIFY_LEADS_ON_MEETING:-false}
      - APP_NAME=${APP_NAME:-Dimora CRM}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      - api
      - redis
    volumes:
      - ./app:/app/app
    networks:
      - dimora-network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dimora-celery-beat
    command: celery -A app.tasks beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://dimora:dimora_secret@db:5432/dimora_crm
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      - api
      - redis
    volumes:
      - ./app:/app/app
    networks:
      - dimora-network

  db:
    image: postgres:16-alpine
    container_name: dimora-db
    environment:
      POSTGRES_USER: dimora
      POSTGRES_PASSWORD: dimora_secret
      POSTGRES_DB: dimora_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dimora -d dimora_crm"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dimora-network

  redis:
    image: redis:7-alpine
    container_name: dimora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dimora-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}
    container_name: dimora-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - dimora-network

  minio:
    image: minio/minio:latest
    container_name: dimora-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - dimora-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  dimora-network:
    driver: bridge
